<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Эффект при наведении</title>
    
    <!-- 1. CSS СТИЛИ -->
    <style>
        /* Стили для самого div, чтобы его было видно */
        div {
            width: 200px;
            height: 200px;
            background-color: lightgray; /* Исходный цвет */
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 50px;
            cursor: pointer;
            transition: 0.3s; /* Плавное изменение цвета */
        }

        /* Стили для класса .brown, который добавляет JS */
        .brown {
            background-color: brown !important;
            color: white;
        }
    </style>
</head>
<body>

    <!-- 2. HTML ЭЛЕМЕНТ -->
    <div>Наведи на меня</div>

    <!-- 3. JAVASCRIPT КОД -->
    <script>
        const div = document.querySelector("div");

        div.addEventListener("mouseenter", () => {
            div.classList.add("brown");
        });

        div.addEventListener("mouseleave", () => {
            div.classList.remove("brown");
        });
    </script>

</body>
</html>
